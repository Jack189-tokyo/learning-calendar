<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>学习成长记录</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>学习成长记录</h1>

        <!-- 数学正确率 -->
        <section>
            <h2>数学计算能力</h2>
            <input type="number" id="mathInput" placeholder="输入正确率(%)">
            <button onclick="updateAccuracy('math')">更新</button>
            <canvas id="mathChart"></canvas>
        </section>

        <!-- 英语阅读正确率 -->
        <section>
            <h2>英语阅读</h2>
            <input type="number" id="readingInput" placeholder="输入正确率(%)">
            <button onclick="updateAccuracy('reading')">更新</button>
            <canvas id="readingChart"></canvas>
        </section>

        <!-- 英语拼写正确率 -->
        <section>
            <h2>英语拼写</h2>
            <input type="number" id="spellingInput" placeholder="输入正确率(%)">
            <button onclick="updateAccuracy('spelling')">更新</button>
            <canvas id="spellingChart"></canvas>
        </section>

        <!-- 错题本 -->
        <section>
            <h2>错题本</h2>
            <input type="text" id="wrongQuestion" placeholder="输入错题">
            <button onclick="addWrong()">添加错题</button>
            <ul id="wrongList"></ul>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
