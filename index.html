<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习进度追踪 - 荣誉版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 核心动画：随机平铺浮动 */
        @keyframes floatRandom {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(25px, -35px) rotate(5deg);
            }

            66% {
                transform: translate(-20px, 15px) rotate(-5deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        .math-symbol {
            position: absolute;
            font-weight: 900;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            pointer-events: none;
            user-select: none;
            will-change: transform;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
            z-index: -1;
        }

        /* --- 适配手机端的高级感勋章弹窗 --- */
        #medalPopup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(123, 104, 238, 0.4);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: medalPopScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            /* 默认尺寸（PC端） */
            width: 220px;
            height: 220px;
        }

            #medalPopup span {
                font-size: 100px;
                filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
                line-height: 1;
                display: block;
            }

        /* --- 移动端适配关键逻辑 --- */
        @media (max-width: 600px) {
            #medalPopup {
                width: 160px; /* 手机端缩小宽度 */
                height: 160px; /* 手机端缩小高度 */
                border-radius: 35px;
                padding: 20px;
            }

                #medalPopup span {
                    font-size: 75px; /* 手机端缩小图标 */
                }
        }

        /* 弹出动画：增加了透明度过渡和轻微旋转 */
        @keyframes medalPopScale {
            0% {
                transform: translate(-50%, -50%) scale(0.3) rotate(-10deg);
                opacity: 0;
            }

            70% {
                transform: translate(-50%, -50%) scale(1.1) rotate(5deg);
            }

            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div id="math-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background-color: #f8f9fe;"></div>

    <div id="medalPopup"></div>

    <div id="authContainer" class="container">
        <div class="auth-box">
            <div class="auth-card">
                <h2 style="margin-bottom: 20px;">欢迎回来</h2>
                <div class="auth-tabs">
                    <button id="showLogin" class="active">登录</button>
                    <button id="showRegister">注册</button>
                </div>

                <div id="loginForm">
                    <div class="input-group">
                        <input type="email" id="emailInput" placeholder="电子邮箱">
                        <input type="password" id="passwordInput" placeholder="密码">
                    </div>
                    <button class="primary-btn" onclick="handleLogin()">立即登录</button>
                </div>

                <div id="registerForm" style="display: none;">
                    <div class="input-group">
                        <input type="email" id="regEmailInput" placeholder="设置邮箱">
                        <input type="password" id="regPasswordInput" placeholder="设置密码 (至少6位)">
                    </div>
                    <button class="primary-btn" onclick="handleRegister()">创建账号</button>
                </div>

                <p id="authMsg" style="margin-top: 15px; font-size: 14px; color: #ff4d4f; min-height: 20px;"></p>
            </div>
        </div>
    </div>

    <div id="appContainer" class="container" style="display: none;">
        <div class="status-bar">
            <span id="loginStatus">👤 用户登录中...</span>
            <button class="text-btn" onclick="handleLogout()">退出登录</button>
        </div>

        <section class="calendar-section">
            <div class="calendar-controls">
                <div class="month-controls">
                    <button id="prevMonthBtn" class="nav-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" /></svg>
                    </button>
                    <h2 id="currentMonthLabel">2026年1月</h2>
                    <button id="nextMonthBtn" class="nav-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z" /></svg>
                    </button>
                </div>

                <div class="subject-select-wrap">
                    <div class="custom-select-trigger" id="selectTrigger">
                        <span id="selectedOptionText">数学热力图</span>
                        <span style="font-size: 10px; margin-left: 5px;">▼</span>
                    </div>
                    <div class="custom-options" id="customOptions">
                        <div class="custom-option active" data-value="math">数学热力图</div>
                        <div class="custom-option" data-value="reading">阅读热力图</div>
                        <div class="custom-option" data-value="spelling">拼写热力图</div>
                    </div>
                </div>
            </div>

            <div class="calendar-header">
                <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>

            <div class="legend">
                <span style="margin-right: 5px;">低正确率</span>
                <div class="legend-box lv1"></div>
                <div class="legend-box lv2"></div>
                <div class="legend-box lv3"></div>
                <div class="legend-box lv4"></div>
                <span style="margin-left: 5px;">高正确率</span>
            </div>
        </section>

        <section class="entry-section">
            <h3 style="margin-bottom: 15px;">当日成绩: <span id="selectedDateText" style="color: #7b68ee;"></span></h3>
            <div class="entry-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px;">
                <div class="entry-item">
                    <label>数学 %</label>
                    <input type="number" id="mathInput" placeholder="0-100">
                </div>
                <div class="entry-item">
                    <label>阅读 %</label>
                    <input type="number" id="readingInput" placeholder="0-100">
                </div>
                <div class="entry-item">
                    <label>拼写 %</label>
                    <input type="number" id="spellingInput" placeholder="0-100">
                </div>
            </div>
            <button class="primary-btn" id="saveDayBtn">保存今日记录</button>
        </section>

        <section>
            <h3 style="margin-bottom: 10px;">成绩趋势对比</h3>
            <div style="position: relative; height: 180px; width: 100%;">
                <canvas id="dayBarChart"></canvas>
            </div>
        </section>

        <section>
            <h3>错题笔记本</h3>
            <div style="display: flex; gap: 10px; margin: 15px 0;">
                <input type="text" id="wrongQuestionInput" placeholder="输入错题内容或知识点..." style="flex:1;">
                <button class="primary-btn" id="addWrongBtn" style="width: 80px; margin-top: 0;">添加</button>
            </div>
            <ul id="wrongList" class="wrong-list-container"></ul>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #f0f0f5;">
            <h4 style="color: #8a87b8; font-size: 13px;">历史错题库 (点击日期查看)</h4>
            <div id="wrongCalendar" class="history-scroll-box"></div>
        </section>

        <section class="honor-section">
            <h3 style="margin-bottom: 15px;">🏆 勋章荣誉墙</h3>
            <div class="medal-stats-bar">
                <div class="stat-item">🥇 金牌: <span id="goldCount">0</span></div>
                <div class="stat-item">🥈 银牌: <span id="silverCount">0</span></div>
                <div class="stat-item">🥉 铜牌: <span id="bronzeCount">0</span></div>
            </div>
            <div id="honorWall" class="honor-grid"></div>
            <div class="pagination-controls">
                <button id="prevPageBtn" class="page-btn">上一页</button>
                <span id="pageIndicator">第 1 / 1 页</span>
                <button id="nextPageBtn" class="page-btn">下一页</button>
            </div>
        </section>

        <div class="footer-actions" style="text-align: center; margin: 20px 0;">
            <button class="text-btn">生成学习周报</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="client.js"></script>

</body>
</html>
